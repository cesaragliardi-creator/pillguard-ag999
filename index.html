<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PillGuard AG-999</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
  background: #0f172a;
  color: #e2e8f0;
}

h1 {
  color: #38bdf8;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

.slider {
  width: 100%;
}

.result {
  font-size: 20px;
  margin-top: 10px;
}

.bar {
  height: 10px;
  background: #38bdf8;
  margin-top: 5px;
}

</style>
</head>

<body>

<h1>PillGuard AG-999</h1>

<div class="container">

<div class="card">
<h3>Parameters</h3>

<label>Fiber Quality</label>
<input type="range" min="0" max="10" value="5" id="fiber" class="slider">

<label>Yarn Structure</label>
<input type="range" min="0" max="10" value="5" id="yarn" class="slider">

<label>Fabric Density</label>
<input type="range" min="0" max="10" value="5" id="fabric" class="slider">

<label>Finishing Treatment</label>
<input type="range" min="0" max="10" value="5" id="finish" class="slider">

</div>

<div class="card">
<h3>Results</h3>

<div class="result" id="iso"></div>
<div class="result" id="score"></div>

<h4>Trade-offs</h4>
<div id="cost"></div>
<div id="energy"></div>
<div id="comfort"></div>

<h4>Parameter Influence</h4>
<div>Fiber<div class="bar" id="fiberBar"></div></div>
<div>Yarn<div class="bar" id="yarnBar"></div></div>
<div>Fabric<div class="bar" id="fabricBar"></div></div>
<div>Finishing<div class="bar" id="finishBar"></div></div>

</div>

</div>

<script>

function computeModel(fiber, yarn, fabric, finish){

  // Base interaction model
  const base = (fiber + yarn + fabric + finish) / 4;

  const interaction = (fiber * yarn + fabric * finish) * 0.02;

  const score = base + interaction;

  // ISO classification
  let iso;
  if(score > 8) iso = 5;
  else if(score > 6) iso = 4;
  else if(score > 4) iso = 3;
  else if(score > 2) iso = 2;
  else iso = 1;

  // Trade-offs
  const cost = fiber*2 + finish*3;
  const energy = fabric*2 + finish*2;
  const comfort = 100 - (fabric*5 + finish*3);

  // Influence (normalized)
  const total = fiber + yarn + fabric + finish || 1;

  const influence = {
    fiber: fiber/total,
    yarn: yarn/total,
    fabric: fabric/total,
    finish: finish/total
  };

  return {score, iso, cost, energy, comfort, influence};
}

function update(){

  const fiber = +document.getElementById("fiber").value;
  const yarn = +document.getElementById("yarn").value;
  const fabric = +document.getElementById("fabric").value;
  const finish = +document.getElementById("finish").value;

  const res = computeModel(fiber, yarn, fabric, finish);

  document.getElementById("iso").innerText = "ISO Class: " + res.iso;
  document.getElementById("score").innerText = "Score: " + res.score.toFixed(2);

  document.getElementById("cost").innerText = "Cost: " + res.cost.toFixed(1);
  document.getElementById("energy").innerText = "Energy: " + res.energy.toFixed(1);
  document.getElementById("comfort").innerText = "Comfort: " + res.comfort.toFixed(1);

  document.getElementById("fiberBar").style.width = (res.influence.fiber*100) + "%";
  document.getElementById("yarnBar").style.width = (res.influence.yarn*100) + "%";
  document.getElementById("fabricBar").style.width = (res.influence.fabric*100) + "%";
  document.getElementById("finishBar").style.width = (res.influence.finish*100) + "%";
}

// Event listeners
document.querySelectorAll("input").forEach(el => {
  el.addEventListener("input", update);
});

// Initial run
update();

</script>

</body>
</html>
